---
# Run login tests using OAuth and non-sysop tests on test wiki
name: Oauth CI

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYWIKIBOT_TEST_RUNNING: 1
  PYWIKIBOT_USERNAME: Pywikibot-oauth

jobs:
  build:
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    continue-on-error: ${{ matrix.experimental || false }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - pypy3.9
          - pypy3.11
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
          - 3.15-dev
        family: [wikipedia]
        code: [test]
        domain: [test.wikipedia.org]
        include:
          - python-version: '3.9'
            family: wpbeta
            code: en
            domain: en.wikipedia.beta.wmcloud.org
          - python-version: '3.9'
            family: wpbeta
            code: zh
            domain: zh.wikipedia.beta.wmcloud.org
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ endsWith(matrix.python-version, '-dev') }}
      - name: Get token name
        env:
          _oauth_token: OAUTH_TOKEN_${{ matrix.family }}_${{ matrix.code }}
        uses: ASzc/change-string-case-action@v6
        id: token
        with:
          string: ${{ env._oauth_token }}
      - name: Split OAuth Token
        uses: jungwinter/split@v2
        id: split
        with:
          msg: ${{ secrets[format('{0}', steps.token.outputs.uppercase)] }}
          separator: ':'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip --version
          pip install coverage
          # tomli required for coverage due to T380697
          pip install "tomli; python_version < '3.11'"
          pip install mwparserfromhell
          # PyJWT added due to T380270
          pip install "PyJWT != 2.10.0, != 2.10.1"
          pip install mwoauth
          pip install packaging
          pip install requests
          pip install requests[socks]
      - name: Configure and start WMCS SOCKS tunnel
        env:
          USER: ${{ secrets.WMCS_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.WMCS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh-keyscan bastion.wmcloud.org >> ~/.ssh/known_hosts
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=10 \
            -f -N \
            -D 127.0.0.1:1080 \
            -i ~/.ssh/id_ed25519 \
            "$USER@bastion.wmcloud.org"
          echo "Socket connection:"
          ss -lntp | grep 1080 || true
          echo "Local IP:"
          curl -s https://api.ipify.org
          echo "Proxy IP:"
          curl --proxy socks5h://127.0.0.1:1080 -s https://api.ipify.org
      - name: Generate family files
        if: ${{ matrix.family == 'wpbeta' }}
        env:
          HTTP_PROXY: socks5h://127.0.0.1:1080
          HTTPS_PROXY: socks5h://127.0.0.1:1080
          ALL_PROXY: socks5h://127.0.0.1:1080
          NO_PROXY: ""
        run: |
          python pwb.py generate_family_file http://${{matrix.code}}.wikipedia.beta.wmcloud.org/ wpbeta y
      - name: Generate user files
        run: |
          python -Werror::UserWarning -m pwb generate_user_files  \
            -family:${{matrix.family}} \
            -code:${{matrix.code}} \
            -user:${{ env.PYWIKIBOT_USERNAME }} \
            -v \
            -debug;
          echo "::add-mask::$CK"
          echo "::add-mask::$CS"
          echo "::add-mask::$AK"
          echo "::add-mask::$AS"
          echo "usernames['commons']['beta'] = '${{ env.PYWIKIBOT_USERNAME }}'" >> user-config.py
          echo "usernames['meta']['meta'] = '${{ env.PYWIKIBOT_USERNAME }}'" >> user-config.py
          echo "authenticate['${{ matrix.domain }}'] = ('$CK', '$CS', '$AK', '$AS')" >> user-config.py
          echo "noisysleep = float('inf')" >> user-config.py
          echo "maximum_GET_length = 5000" >> user-config.py
          echo "console_encoding = 'utf8'" >> user-config.py
        env:
          CK: ${{ steps.split.outputs._0 }}
          CS: ${{ steps.split.outputs._1 }}
          AK: ${{ steps.split.outputs._2 }}
          AS: ${{ steps.split.outputs._3 }}
      - name: Oauth tests with unittest
        id: ci_test
        continue-on-error: true
        timeout-minutes: 8
        env:
          PYWIKIBOT_TEST_WRITE: 1
          PYWIKIBOT_TEST_OAUTH: ${{ secrets[format('{0}', steps.token.outputs.uppercase)] }}
          PYWIKIBOT_TEST_MODULES: edit_failure,file,oauth,superset
          HTTP_PROXY: socks5h://127.0.0.1:1080
          HTTPS_PROXY: socks5h://127.0.0.1:1080
          ALL_PROXY: socks5h://127.0.0.1:1080
          NO_PROXY: ""
        run: |
          python pwb.py version
          coverage run -m unittest -vv
      - name: Show coverage statistics
        run: |
          coverage combine || true
          coverage report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Check on failure
        if: steps.ci_test.outcome == 'failure'
        run: |-
          exit 1
