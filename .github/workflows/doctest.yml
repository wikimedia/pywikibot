---
# Run Pywikibot doctests  with a variety of Python versions
name: Doctest CI

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYWIKIBOT_TEST_RUNNING: 1
  PYWIKIBOT_USERNAME: Pywikibot-test

jobs:
  build:
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: [pypy3.11, '3.10', '3.11', '3.12', '3.13', '3.14']
        os: [windows-latest, macOS-latest, ubuntu-latest]
        include:
          - python-version: 3.15-dev
        exclude:  # Test already made on Jenkins
          - python-version: '3.10'
            os: ubuntu-latest
          - python-version: '3.14'
            os: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ endsWith(matrix.python-version, '-dev') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip --version
          pip install coverage
          pip install "tomli; python_version < '3.11'"
          pip install mwparserfromhell
          pip install packaging
          pip install PyMySQL
          pip install "pytest >= 9.0.3"
          pip install requests-sse
          pip install wikitextparser
          pip install requests[socks]
      - name: Configure and start WMCS SOCKS tunnel
        shell: bash
        env:
          USER: ${{ secrets.WMCS_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.WMCS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh-keyscan bastion.wmcloud.org >> ~/.ssh/known_hosts
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=10 \
            -f -N \
            -D 127.0.0.1:1080 \
            -i ~/.ssh/id_ed25519 \
            "$USER@bastion.wmcloud.org"
          echo "Socket connection:"
          ss -lntp | grep 1080 || true
          echo "Local IP:"
          curl -s https://api.ipify.org
          echo "Proxy IP:"
          curl --proxy socks5h://127.0.0.1:1080 -s https://api.ipify.org
      - name: Generate user files
        run: |
          python -Werror::UserWarning -m pwb generate_user_files -site:wikipedia:test -user:${{ env.PYWIKIBOT_USERNAME }} -v -debug;
          echo "maxlag = 20" >> user-config.py
      - name: doctest with pytest
        id: ci_test
        continue-on-error: true
        timeout-minutes: 5
        env:
          PYWIKIBOT_TEST_NO_RC: ${{ (matrix.site == 'wikisource:zh' || matrix.test_no_rc) && 1 || 0 }}
          # Force GIL "off" due to mwparserfromhell issue as suggested by warning in T412624
          PYTHON_GIL: ${{ endsWith(matrix.python-version, 't') && '0' || '1' }}
          HTTP_PROXY: socks5h://127.0.0.1:1080
          HTTPS_PROXY: socks5h://127.0.0.1:1080
          ALL_PROXY: socks5h://127.0.0.1:1080
          NO_PROXY: ""
        run: |
          python pwb.py version
          pytest --version
          coverage run -m pytest pywikibot --doctest-modules --ignore-glob="*gui.py" --ignore-glob="*memento.py" --doctest-wait
      - name: Show coverage statistics
        run: |
          coverage combine || true
          coverage report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Check on failure
        if: steps.ci_test.outcome == 'failure'
        run: |-
          exit 1
